name: 'DocFX'

on:
  workflow_dispatch:

env:
  TZ: America/Chicago

jobs:
  publish-docs:
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
    
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: ./global.json
      - name: Install dependencies
        run: dotnet restore
      
      # Build
      - name: Build
        working-directory: ./src/mkmrk.Channels/
        run: |
          dotnet build \
            --no-restore \
            --configuration Release \
            -consoleloggerparameters:"Summary;Verbosity=normal"

      # https://www.erichiller.github.io/mkmrk.Channels
      # https://dotnet.github.io/docfx/index.html
      - run: dotnet tool update -g docfx
      - run: docfx docs/docfx/docfx.json

#      - name: Deploy
#        uses: peaceiris/actions-gh-pages@v3
#        with:
#          github_token: ${{ secrets.GITHUB_TOKEN }}
#          publish_dir: docs/docfx/_site
      - name: Upload GH Pages Artifact
        uses: actions/upload-pages-artifact
        with:
          path: docs/docfx/_site
